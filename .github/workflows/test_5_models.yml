name: Test 5 Models Installation & Imports

on:
  workflow_dispatch:

jobs:
  test-install:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Base Requirements
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy ta python-telegram-bot python-dotenv huggingface-hub pytz requests

      - name: Install TimesFM and Chronos
        run: |
          pip install timesfm>=2.0.0 chronos-forecasting>=1.0.0

      - name: Install Moirai-2.0 (uni2ts)
        run: |
          pip install uni2ts

      - name: Install Lag-Llama
        run: |
          pip install git+https://github.com/time-series-foundation-models/lag-llama.git

      - name: Install IBM Granite TTM (granite-tsfm)
        run: |
          pip install granite-tsfm

      - name: Test Imports and OBI/Moirai Inference
        run: |
          python test_moirai_inference.py
